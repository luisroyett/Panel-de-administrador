<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Luisroyett</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #6c5ce7; --accent: #ff7675; --bg-dark: #0a0a0a; --bg-card: #1e1e2f; --text-white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-dark); color: var(--text-white); height: 100vh; overflow: hidden; }

        /* Login Screen */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display: flex; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .login-box h2 { margin-bottom: 20px; color: var(--main-color); }
        .login-box input { padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; width: 200px; }
        .login-box button { padding: 10px 30px; background: var(--main-color); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* Admin Layout */
        .admin-container { display: none; height: 100vh; flex-direction: column; }
        .admin-topbar { background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .admin-topbar h2 { color: var(--main-color); font-family: 'Oswald'; }
        .admin-body { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 300px; background: #0f0f0f; border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        .sidebar-section { margin-bottom: 20px; }
        .sidebar-section label { display: block; font-size: 0.8rem; text-transform: uppercase; color: #888; margin-bottom: 5px; }
        .sidebar-section input, .sidebar-section textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; }
        .file-box { border: 1px dashed #555; padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; }
        .file-box img { max-width: 100%; margin-top: 10px; border-radius: 4px; }

        /* Main Builder */
        .main-builder { flex: 1; background: #151521; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .builder-tools { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: #151521; padding-bottom: 10px; z-index: 10; }
        .btn-add { background: #333; color: white; padding: 8px 15px; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
        .btn-add:hover { background: var(--main-color); border-color: var(--main-color); }

        /* Blocks */
        .block { background: #2d3436; border: 1px solid #444; border-radius: 8px; margin-bottom: 15px; }
        .block-header { background: #222; padding: 8px 15px; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; border-bottom: 1px solid #444; }
        .block-title { font-weight: bold; color: var(--main-color); font-size: 0.9rem; }
        .block-actions button { background: transparent; border: none; color: #888; cursor: pointer; margin-left: 5px; }
        .block-content { padding: 15px; }

        /* Rich Editor inside Block */
        .mini-toolbar { display: flex; gap: 5px; margin-bottom: 10px; background: #222; padding: 5px; border-radius: 4px; }
        .mini-btn { background: #333; border: none; color: white; padding: 5px 8px; border-radius: 3px; cursor: pointer; }
        .mini-select { background: #333; border: none; color: white; padding: 5px; border-radius: 3px; }
        .rich-input { min-height: 100px; background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px solid #333; outline: none; color: white; }

        /* Tabs */
        .tabs { display: flex; background: #0f0f0f; border-bottom: 1px solid #333; }
        .tab { padding: 15px 30px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--main-color); border-bottom: 2px solid var(--main-color); background: #151521; }

        .tab-content { display: none; flex: 1; }
        .tab-content.active { display: flex; }

        /* Top Editor */
        .top-editor { padding: 40px; max-width: 600px; margin: 0 auto; width: 100%; }
        .top-item-edit { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .rank-num { font-size: 1.5rem; color: var(--main-color); width: 30px; text-align: center; }

        .btn-publish { background: linear-gradient(90deg, var(--main-color), var(--accent)); color: white; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: auto; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Acceso Administrador</h2>
            <input type="password" id="pass-input" placeholder="Contraseña">
            <br>
            <button onclick="login()">Entrar</button>
        </div>
    </div>

    <!-- Admin App -->
    <div class="admin-container" id="admin-app">
        <div class="admin-topbar">
            <h2>Panel de Control - Luisroyett</h2>
            <button onclick="location.href='index.html'" style="background:#333; color:white; padding:8px 15px; border:none; cursor:pointer;">Ver Blog</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">Crear Noticias</div>
            <div class="tab" onclick="switchTab(1)">Editar Top Anime</div>
        </div>

        <div class="admin-body">
            <!-- TAB 1: NEWS -->
            <div class="tab-content active" id="tab-news">
                <div class="sidebar">
                    <div class="sidebar-section">
                        <label>Título de la Noticia</label>
                        <input type="text" id="main-title">
                    </div>
                    <div class="sidebar-section">
                        <label>Imagen de Portada</label>
                        <div class="file-box" onclick="document.getElementById('cover-input').click()">
                            <input type="file" id="cover-input" hidden accept="image/*" onchange="previewCover(this)">
                            <span id="cover-text">📷 Subir Imagen</span>
                            <img id="cover-preview" src="" style="display:none; width:100%;">
                        </div>
                    </div>
                    <div class="sidebar-section">
                        <label>Fecha</label>
                        <input type="text" id="main-date" disabled>
                    </div>
                </div>

                <div class="main-builder">
                    <div class="builder-tools">
                        <button class="btn-add" onclick="addBlock('text')">📝 Texto</button>
                        <button class="btn-add" onclick="addBlock('image')">🖼 Imagen</button>
                        <button class="btn-add" onclick="addBlock('video')">▶️ Video</button>
                    </div>
                    <div id="blocks-container"></div>
                    <button class="btn-publish" onclick="publishNews()">🚀 PUBLICAR NOTICIA</button>
                </div>
            </div>

            <!-- TAB 2: TOP -->
            <div class="tab-content" id="tab-top">
                <div class="top-editor">
                    <h2 style="margin-bottom:20px; border-bottom:1px solid #444; padding-bottom:10px;">Editar Ranking Semanal</h2>
                    <div id="top-editor-list"></div>
                    <button class="btn-publish" onclick="saveTop()">💾 GUARDAR TOP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Lógica Login ---
        function login() {
            const pass = document.getElementById('pass-input').value;
            if(pass === "luisroyett") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-app').style.display = 'flex';
                initAdmin();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        // --- Init ---
        let blocks = [];
        let blockCount = 0;
        
        function initAdmin() {
            // Fecha
            document.getElementById('main-date').value = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) + " - Luisroyett";
            
            // Cargar Top actual en editor
            const topData = JSON.parse(localStorage.getItem('topAnime')) || [
                {rank:1, title:"Frieren", genre:"Fantasia"}, 
                {rank:2, title:"One Piece", genre:"Aventura"}, 
                {rank:3, title:"JJK", genre:"Accion"}
            ];
            const list = document.getElementById('top-editor-list');
            list.innerHTML = '';
            topData.forEach((item, i) => {
                list.innerHTML += `
                    <div class="top-item-edit">
                        <div class="rank-num">${i+1}</div>
                        <div style="flex:1;">
                            <input type="text" id="top-title-${i}" value="${item.title}" style="width:100%; margin-bottom:5px; padding:8px; background:#333; border:1px solid #555; color:white;">
                            <input type="text" id="top-genre-${i}" value="${item.genre}" style="width:100%; padding:8px; background:#333; border:1px solid #555; color:white;">
                        </div>
                    </div>
                `;
            });
        }

        function switchTab(index) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
            document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === index));
        }

        // --- Builder Logic ---
        function addBlock(type) {
            blocks.push({ id: blockCount++, type: type, content: '' });
            renderBlocks();
        }

        function moveBlock(id, dir) {
            const idx = blocks.findIndex(b => b.id === id);
            if(dir === 'up' && idx > 0) [blocks[idx], blocks[idx-1]] = [blocks[idx-1], blocks[idx]];
            if(dir === 'down' && idx < blocks.length-1) [blocks[idx], blocks[idx+1]] = [blocks[idx+1], blocks[idx]];
            renderBlocks();
        }

        function deleteBlock(id) {
            blocks = blocks.filter(b => b.id !== id);
            renderBlocks();
        }

        function renderBlocks() {
            const container = document.getElementById('blocks-container');
            container.innerHTML = '';
            blocks.forEach(b => {
                let html = '';
                
                // Bloque Texto con Editor Rico
                if(b.type === 'text') {
                    html = `
                        <div class="block">
                            <div class="block-header">
                                <span class="block-title">📝 Texto Enriquecido</span>
                                <div class="block-actions">
                                    <button onclick="moveBlock(${b.id}, 'up')">⬆️</button>
                                    <button onclick="moveBlock(${b.id}, 'down')">⬇️</button>
                                    <button onclick="deleteBlock(${b.id})">❌</button>
                                </div>
                            </div>
                            <div class="block-content">
                                <div class="mini-toolbar">
                                    <button class="mini-btn" onclick="format('bold')"><b>B</b></button>
                                    <button class="mini-btn" onclick="format('italic')"><i>I</i></button>
                                    <button class="mini-btn" onclick="format('underline')"><u>U</u></button>
                                    <select class="mini-select" onchange="format('fontName', this.value)">
                                        <option value="Arial">Arial</option>
                                        <option value="Georgia">Georgia</option>
                                        <option value="Courier New">Courier</option>
                                    </select>
                                    <select class="mini-select" onchange="format('fontSize', this.value)">
                                        <option value="3">Normal</option>
                                        <option value="5">Grande</option>
                                        <option value="6">Muy Grande</option>
                                    </select>
                                    <input type="color" class="mini-select" style="padding:0; width:30px;" onchange="format('foreColor', this.value)">
                                </div>
                                <div id="txt-${b.id}" class="rich-input" contenteditable="true" oninput="updateText(${b.id})"></div>
                            </div>
                        </div>`;
                }
                // Bloque Imagen
                else if(b.type === 'image') {
                    html = `
                        <div class="block">
                            <div class="block-header">
                                <span class="block-title">🖼 Imagen</span>
                                <div class="block-actions">
                                    <button onclick="moveBlock(${b.id}, 'up')">⬆️</button>
                                    <button onclick="moveBlock(${b.id}, 'down')">⬇️</button>
                                    <button onclick="deleteBlock(${b.id})">❌</button>
                                </div>
                            </div>
                            <div class="block-content" style="text-align:center;">
                                <img id="img-preview-${b.id}" src="${b.content}" style="max-width:100%; display:${b.content ? 'block' : 'none'}; border-radius:4px; margin-bottom:10px;">
                                <input type="file" accept="image/*" onchange="handleImg(this, ${b.id})" style="display:${b.content ? 'none' : 'inline-block'};">
                            </div>
                        </div>`;
                }
                // Bloque Video
                else if(b.type === 'video') {
                    html = `
                        <div class="block">
                            <div class="block-header">
                                <span class="block-title">▶️ Video</span>
                                <div class="block-actions">
                                    <button onclick="moveBlock(${b.id}, 'up')">⬆️</button>
                                    <button onclick="moveBlock(${b.id}, 'down')">⬇️</button>
                                    <button onclick="deleteBlock(${b.id})">❌</button>
                                </div>
                            </div>
                            <div class="block-content">
                                <input type="text" placeholder="Pega la URL de YouTube aquí" value="${b.content}" onchange="updateVideo(${b.id}, this.value)" style="width:100%; padding:8px; background:#000; border:1px solid #555; color:white;">
                            </div>
                        </div>`;
                }
                container.innerHTML += html;
            });
        }

        // Helpers para formato
        function format(cmd, value=null) {
            document.execCommand(cmd, false, value);
        }
        
        function updateText(id) {
            const el = document.getElementById('txt-' + id);
            const block = blocks.find(b => b.id === id);
            if(el && block) block.content = el.innerHTML;
        }

        function handleImg(input, id) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    const block = blocks.find(b => b.id === id);
                    block.content = e.target.result;
                    const preview = document.getElementById('img-preview-' + id);
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    input.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateVideo(id, value) {
            const block = blocks.find(b => b.id === id);
            block.content = value;
        }

        function previewCover(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('cover-preview').src = e.target.result;
                    document.getElementById('cover-preview').style.display = 'block';
                    document.getElementById('cover-text').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- PUBLICAR ---
        function publishNews() {
            const title = document.getElementById('main-title').value;
            const cover = document.getElementById('cover-preview').src;
            const date = document.getElementById('main-date').value;

            if(!title || !cover) { alert("Falta título o portada"); return; }

            // Construimos el HTML final
            let finalHtml = '';
            
            // Sincronizar texto
            blocks.forEach(b => {
                if(b.type === 'text') {
                    finalHtml += `<div style="margin-bottom:20px;">${b.content}</div>`;
                }
                else if(b.type === 'image' && b.content) {
                    finalHtml += `<img src="${b.content}" style="display:block; max-width:100%; margin:20px auto; border-radius:8px;">`;
                }
                else if(b.type === 'video' && b.content) {
                    let videoId = '';
                    let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    let match = b.content.match(regExp);
                    if (match && match[2].length == 11) {
                        videoId = match[2];
                        finalHtml += `<div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; margin:30px 0;"><iframe src="https://www.youtube.com/embed/${videoId}" style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen></iframe></div>`;
                    }
                }
            });

            // Guardar en localStorage
            const currentNews = JSON.parse(localStorage.getItem('blogNews')) || [];
            const newArticle = {
                id: Date.now(),
                title: title,
                img: cover,
                date: date,
                content: finalHtml,
                comments: []
            };
            currentNews.unshift(newArticle);
            localStorage.setItem('blogNews', JSON.stringify(currentNews));

            alert("¡Noticia publicada con éxito!");
            
            // Reset
            document.getElementById('main-title').value = '';
            document.getElementById('cover-preview').style.display = 'none';
            document.getElementById('cover-text').style.display = 'block';
            blocks = [];
            renderBlocks();
        }

        function saveTop() {
            const newTop = [];
            for(let i=0; i<3; i++) {
                newTop.push({
                    rank: i+1,
                    title: document.getElementById('top-title-'+i).value,
                    genre: document.getElementById('top-genre-'+i).value
                });
            }
            localStorage.setItem('topAnime', JSON.stringify(newTop));
            alert("Top Anime actualizado");
        }

    </script>
</body>
</html>
